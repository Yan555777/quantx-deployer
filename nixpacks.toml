[phases.setup]
nixPkgs = ["python311", "gcc", "postgresql"]

[phases.install]
cmds = [
  "python3.11 -m ensurepip --upgrade --break-system-packages",
  "python3.11 -m pip install --no-cache-dir --break-system-packages -r requirements.txt"
]

[start]
cmd = "uvicorn api.main:app --host 0.0.0.0 --port $PORT --workers 1"
